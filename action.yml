name: 'AutoDoc Agent'
description: 'AI agent that automatically updates documentation when PRs are merged'
author: 'Veronikapj'

inputs:
  anthropic-api-key:
    description: 'Anthropic API Key (provider: anthropic 설정 시 필요)'
    required: false
    default: ''
  google-api-key:
    description: 'Google API Key (provider: google 설정 시 필요)'
    required: false
    default: ''
  openai-api-key:
    description: 'OpenAI API Key (provider: openai 설정 시 필요)'
    required: false
    default: ''
  confluence-token:
    description: 'Confluence API Token (spec.source: confluence 설정 시 필요)'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'file-text'
  color: 'blue'
