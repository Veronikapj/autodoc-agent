name: AutoDoc Sync

on:
  workflow_dispatch:
    inputs:
      doc_type:
        description: '생성/업데이트할 문서 (all = 전체 동기화)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - README
          - ARCH_DOC
          - API_DOC
          - TEST_DOC
          - CHANGELOG
          - SETUP_DOC
          - SPEC_DOC

jobs:
  autodoc-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run AutoDoc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_REPO_PATH: ${{ github.workspace }}
        run: |
          if [ "${{ github.event.inputs.doc_type }}" = "all" ]; then
            ./gradlew run --args="--sync"
          else
            ./gradlew run --args="--doc ${{ github.event.inputs.doc_type }}"
          fi
